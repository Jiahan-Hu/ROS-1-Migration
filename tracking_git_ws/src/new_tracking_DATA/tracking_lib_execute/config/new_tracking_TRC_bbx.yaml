tracking: {
  # local_frame_id: "veh1_rslidar",
  local_frame_id: "veh2_rslidar", # "map"
  global_frame_id: "map",
  # Query Ros TF timeout in ms. ros::Duration time.
  # type: int
  # default: 10
  tf_timeout_ms: 1,

  # segmented point clouds directly from segment node # previous: /segment/clouds_segmented /detection/lidar_detector/points_cluster
  sub_pcs_segmented_topic: "/fusion/seg/segment_msgs",
  sub_pcs_queue_size: 1,
  sub_lidar_detector_objects_topic: "/fusion/detection/lidar_detector/objects",  

  # intermediate segments
  pub_segments_coarse_topic: "/fusion/tracking/segments_coarse",
  pub_segments_predict_topic: "/fusion/tracking/segments_predict",
  pub_segments_topic: "/fusion/tracking/segments",
  # output of tracking system
  pub_output_objects_topic: "/fusion/tracking/tracking_objects",
  pub_output_objects_local_topic: "/fusion/tracking/tracking_objects_local", 
  pub_output_trajectories_topic: "/fusion/tracking/fixed_trajectories",
  # intermediate visualization
  pub_tracking_objects_topic: "/fusion/tracking/objects", # original
  pub_tracking_objects_box_topic: "/fusion/tracking/objects_box",  #zzl 
  pub_tracking_objects_box_score_topic: "/fusion/tracking/objects_box_score", # zzl
  pub_tracking_objects_fusion_box_score_topic: "/fusion/tracking/objects_fusion_box_score", # zzl
  pub_tracking_objects_header_box_score_topic: "/fusion/tracking/objects_header_box_score", # zzl
  pub_tracking_objects_cloud_topic: "/fusion/tracking/clouds", # point cloud
  pub_tracking_objects_velocity_topic: "/fusion/tracking/objects_vel",
  pub_tracking_objects_trajectory_topic: "/fusion/tracking/trajectory",
  # visualization color topic 
  objects_box_score_color_topic: "YELLOW", # "GREEN" or "RED" or "BLUE" or "YELLOW" or "CYAN"
}
